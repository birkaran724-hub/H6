<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hand Laser FX</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden}
  #canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}
  #hud{position:fixed;top:12px;left:12px;z-index:2;font-family:monospace;display:flex;flex-direction:column;gap:6px}
  .s{background:rgba(0,0,0,0.7);border:1px solid #00ffc8;color:#00ffc8;font-size:12px;padding:5px 10px}
  #overlay{position:fixed;inset:0;background:#000;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;color:#fff;font-size:14px;font-family:monospace;text-align:center;padding:20px}
  #startBtn{padding:16px 40px;background:#00ffc8;border:none;color:#000;font-size:18px;font-family:monospace;cursor:pointer;border-radius:6px;font-weight:bold}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  <div class="s" id="sh">Hands: 0</div>
  <div class="s" id="sf">FPS: -</div>
</div>
<div id="overlay">
  <div id="msg">Tap START</div>
  <button id="startBtn" onclick="startCamera()">START</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"></script>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const sh=document.getElementById('sh');
const sf=document.getElementById('sf');

const video=document.createElement('video');
video.autoplay=true; video.muted=true; video.playsInline=true;

let detector=null,running=false,fc=0,lastT=performance.now();

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

const COLORS=['#ff00ff','#00ffff','#ffff00','#ff4444','#00ff88','#ff8800','#cc88ff','#ffffff'];
const TIPS=[4,8,12,16,20];

// THE FIX: use keypoints3D which has valid x,y,z on iOS Safari
// keypoints3D x,y are normalized 0-1 relative to image size
function getKPs(hand){
  const k3=hand.keypoints3D;
  const k=hand.keypoints;
  const vw=video.videoWidth||640;
  const vh=video.videoHeight||480;

  // If keypoints have valid x,y use them directly (they're in pixel coords)
  if(k && k[0] && k[0].x!==null && k[0].x!==undefined && !isNaN(k[0].x)){
    return k.map(p=>({x:p.x/vw, y:p.y/vh}));
  }
  // Otherwise use keypoints3D (normalized -1 to 1 range, need remapping)
  if(k3 && k3[0] && k3[0].x!==null && !isNaN(k3[0].x)){
    // keypoints3D are in a -1..1 world space — use score-based normalized coords instead
    // Actually on iOS the normalized coords are in keypoints with x/y as 0..1 fractions
    return k3.map(p=>({x:(p.x+1)/2, y:(p.y+1)/2}));
  }
  return null;
}

function toCanvas(nx,ny,dw,dh,dx,dy){
  // nx,ny are 0..1 normalized; mirror x for selfie view
  return {x: dx+(1-nx)*dw, y: dy+ny*dh};
}

function drawHand(hand,dw,dh,dx,dy){
  const kps=getKPs(hand);
  if(!kps) return;

  const tips=TIPS.map(i=>toCanvas(kps[i].x,kps[i].y,dw,dh,dx,dy));
  const wrist=toCanvas(kps[0].x,kps[0].y,dw,dh,dx,dy);

  function gLine(x1,y1,x2,y2,col,w){
    ctx.save();
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle=col; ctx.lineWidth=w+8;
    ctx.globalAlpha=0.3; ctx.shadowColor=col; ctx.shadowBlur=40; ctx.lineCap='round';
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle=col; ctx.lineWidth=w;
    ctx.globalAlpha=1; ctx.shadowColor=col; ctx.shadowBlur=20;
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle='#fff'; ctx.lineWidth=w*0.3;
    ctx.globalAlpha=0.8; ctx.shadowBlur=0;
    ctx.stroke();
    ctx.restore();
  }

  function gDot(x,y,col,r){
    ctx.save();
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=20; ctx.globalAlpha=1;
    ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r*0.4,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.shadowBlur=0;
    ctx.fill();
    ctx.restore();
  }

  // Fan from wrist to fingertips
  tips.forEach((t,i)=>gLine(wrist.x,wrist.y,t.x,t.y,COLORS[i],5));
  // Adjacent tip connections
  for(let i=0;i<tips.length-1;i++)
    gLine(tips[i].x,tips[i].y,tips[i+1].x,tips[i+1].y,COLORS[(i+3)%8],3);
  // Cross diagonals
  [[0,2],[1,3],[0,4],[2,4],[1,4]].forEach(([a,b],i)=>
    gLine(tips[a].x,tips[a].y,tips[b].x,tips[b].y,COLORS[(i+5)%8],2));
  // Dots
  tips.forEach((t,i)=>gDot(t.x,t.y,COLORS[i],7));
  gDot(wrist.x,wrist.y,'#fff',9);
}

function drawPortal(h1,h2,dw,dh,dx,dy){
  const k1=getKPs(h1), k2=getKPs(h2);
  if(!k1||!k2) return;
  const t1=TIPS.map(i=>toCanvas(k1[i].x,k1[i].y,dw,dh,dx,dy));
  const t2=TIPS.map(i=>toCanvas(k2[i].x,k2[i].y,dw,dh,dx,dy));
  [[0,0],[1,1],[2,2],[3,3],[4,4],[0,4],[4,0]].forEach(([a,b],i)=>{
    ctx.save();
    ctx.beginPath(); ctx.moveTo(t1[a].x,t1[a].y); ctx.lineTo(t2[b].x,t2[b].y);
    ctx.strokeStyle=COLORS[(i+1)%8]; ctx.lineWidth=3;
    ctx.shadowColor=COLORS[(i+1)%8]; ctx.shadowBlur=20; ctx.globalAlpha=1; ctx.lineCap='round';
    ctx.stroke(); ctx.restore();
  });
}

async function loop(){
  if(!running) return;
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const cw=canvas.width,ch=canvas.height;
  const vw=video.videoWidth||640,vh=video.videoHeight||480;
  const vr=vw/vh,cr=cw/ch;
  let dw,dh,dx,dy;
  if(vr>cr){dh=ch;dw=ch*vr;dx=(cw-dw)/2;dy=0;}
  else{dw=cw;dh=cw/vr;dx=0;dy=(ch-dh)/2;}

  // Draw mirrored video
  if(video.readyState>=2){
    ctx.save();
    ctx.translate(cw,0); ctx.scale(-1,1);
    ctx.drawImage(video,cw-dx-dw,dy,dw,dh);
    ctx.restore();
  }

  // Detect & draw
  let hands=[];
  if(video.readyState>=2&&detector){
    try{hands=await detector.estimateHands(video,{flipHorizontal:false});}catch(e){}
  }
  sh.textContent='Hands: '+hands.length;
  hands.forEach(h=>drawHand(h,dw,dh,dx,dy));
  if(hands.length>=2) drawPortal(hands[0],hands[1],dw,dh,dx,dy);

  fc++;
  const now=performance.now();
  if(now-lastT>800){
    sf.textContent='FPS: '+Math.round(fc/((now-lastT)/1000));
    fc=0;lastT=now;
  }
  requestAnimationFrame(loop);
}

async function startCamera(){
  const msg=document.getElementById('msg');
  document.getElementById('startBtn').style.display='none';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}
    });
    video.srcObject=stream;
    await new Promise(r=>{video.onloadedmetadata=r;});
    video.play();
    msg.textContent='Loading model...';
    detector=await handPoseDetection.createDetector(
      handPoseDetection.SupportedModels.MediaPipeHands,
      {runtime:'tfjs',modelType:'lite',maxHands:2}
    );
    overlay.style.display='none';
    running=true;
    loop();
  }catch(e){
    msg.textContent='ERROR: '+e.message;
    msg.style.color='#f00';
    document.getElementById('startBtn').style.display='block';
    document.getElementById('startBtn').textContent='RETRY';
  }
}
</script>
</body>
</html>
